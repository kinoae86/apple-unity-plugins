name: Build Apple Core GameKit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Clone Apple Unity Plugins
        run: |
          git clone https://github.com/apple/unityplugins.git
          cd unityplugins
          git submodule update --init --recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Unity
        uses: buildalon/unity-setup@v2
        with:
          unity-version: 6000.0.48f1
          build-targets: iOS
          cache-installation: true

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version

      - name: Show build help
        run: |
          cd unityplugins
          python3 build.py --help || true

      - name: Build Core and GameKit only
        run: |
          cd unityplugins
          python3 build.py -m iOS iPhoneSimulator -p Core GameKit -k all

      - name: List tgz output
        run: |
          find unityplugins/Build -name "*.tgz" -type f -print

      - name: Upload Core and GameKit tgz
        uses: actions/upload-artifact@v4
        with:
          name: apple-core-gamekit-tgz
          path: |
            unityplugins/Build/com.apple.unityplugin.core*.tgz
            unityplugins/Build/com.apple.unityplugin.gamekit*.tgz
